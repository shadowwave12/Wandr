name: Wandr CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint (if configured)
        if: ${{ hashFiles('**/.eslintrc*') != '' }}
        run: npm run lint

      - name: Run tests (if specs exist)
        if: ${{ hashFiles('**/*.test.js') != '' || hashFiles('**/*.spec.js') != '' }}
        run: npm test

      - name: Build app (if script exists)
        run: npm run build --if-present

      - name: Archive production artifact
        if: ${{ hashFiles('public/**/*') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: public-assets
          path: public
